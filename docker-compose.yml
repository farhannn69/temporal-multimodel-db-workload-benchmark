version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Temporal Benchmark – Docker Compose
# Starts: PostgreSQL 15, MongoDB 7, Neo4j 5
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bench_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       temporal_bench
      POSTGRES_USER:     bench_user
      POSTGRES_PASSWORD: bench_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench_user -d temporal_bench"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: bench_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: bench_user
      MONGO_INITDB_ROOT_PASSWORD: bench_pass
      MONGO_INITDB_DATABASE:      temporal_bench
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j ─────────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: bench_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt driver
    environment:
      NEO4J_AUTH: neo4j/bench_pass
      # Increase memory for bulk loading
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size:     "1G"
      NEO4J_server_memory_pagecache_size:     "512m"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
